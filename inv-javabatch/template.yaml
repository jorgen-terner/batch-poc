apiVersion: template.openshift.io/v1
kind: Template
metadata:
  name: inv-javabatch-template
  annotations:
    description: "Template Job for op-proxy-app v2 start-execution"
parameters:
  - name: NAMESPACE
    description: "OpenShift namespace where template Job is created"
    value: dev252
  - name: TEMPLATE_JOB_NAME
    description: "Generated Job name (change to fixed value for single-instance jobs)"
    generate: expression
    from: "inv-javabatch-[a-z0-9]{6}"
  - name: IMAGE
    description: "Container image for inv-javabatch"
    value: image-registry.openshift-image-registry.svc:5000/dev252/inv-javabatch:latest
  - name: CONFIGMAP_NAME
    description: "ConfigMap with runtime configuration"
    value: inv-javabatch-config
  - name: TTL_SECONDS
    description: "Job TTL after completion"
    value: "300"
  - name: COMMON_HEADERS
    description: "Optional headers for all hook calls. Format: Header=Value;Another-Header=Value2"
    value: ""
  - name: START_HEADERS
    description: "Optional headers for START hook. Format: Header=Value;Another-Header=Value2"
    value: ""
  - name: STATUS_HEADERS
    description: "Optional headers for STATUS hook. Format: Header=Value;Another-Header=Value2"
    value: ""
  - name: STOP_HEADERS
    description: "Optional headers for STOP hook. Format: Header=Value;Another-Header=Value2"
    value: ""
objects:
  - apiVersion: batch/v1
    kind: Job
    metadata:
      name: ${TEMPLATE_JOB_NAME}
      namespace: ${NAMESPACE}
      labels:
        app: inv-javabatch
        batch.role: template
    spec:
      suspend: true
      backoffLimit: 0
      ttlSecondsAfterFinished: ${TTL_SECONDS}
      template:
        metadata:
          labels:
            app: inv-javabatch
        spec:
          restartPolicy: Never
          terminationGracePeriodSeconds: 45
          containers:
            - name: inv-javabatch
              image: ${IMAGE}
              imagePullPolicy: Always
              envFrom:
                - configMapRef:
                    name: ${CONFIGMAP_NAME}
              env:
                - name: COMMON_HEADERS
                  value: ${COMMON_HEADERS}
                - name: START_HEADERS
                  value: ${START_HEADERS}
                - name: STATUS_HEADERS
                  value: ${STATUS_HEADERS}
                - name: STOP_HEADERS
                  value: ${STOP_HEADERS}
                - name: JOB_NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
