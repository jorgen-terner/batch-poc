apiVersion: template.openshift.io/v1
kind: Template
metadata:
  name: inf-batch-job-deployment
  annotations:
    description: "Deployment template för inf-batch-job REST API"
    tags: "batch,jobs,quarkus"
objects:
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: inf-batch-job
      namespace: ${NAMESPACE}
      labels:
        app: inf-batch-job
        system: duplo
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: inf-batch-job
          deployment: inf-batch-job
      strategy:
        type: RollingUpdate
        rollingUpdate:
          maxUnavailable: 25%
          maxSurge: 25%
      template:
        metadata:
          labels:
            app: inf-batch-job
            deployment: inf-batch-job
        spec:
          serviceAccountName: ${SERVICE_ACCOUNT_NAME}
          containers:
            - name: inf-batch-job
              image: ${IMAGE_REGISTRY}/${NAMESPACE}/inf-batch-job:${IMAGE_TAG}
              imagePullPolicy: Always
              env:
                - name: K8S_NAMESPACE
                  value: ${NAMESPACE}
              resources:
                limits:
                  cpu: ${CPU_LIMIT}
                  memory: ${MEMORY_LIMIT}
                requests:
                  cpu: ${CPU_REQUEST}
                  memory: ${MEMORY_REQUEST}
              ports:
                - name: http
                  containerPort: 8080
                  protocol: TCP
              startupProbe:
                httpGet:
                  path: /q/health/started
                  port: 8080
                  scheme: HTTP
                timeoutSeconds: 10
                periodSeconds: 10
                successThreshold: 1
                failureThreshold: 10
              readinessProbe:
                httpGet:
                  path: /q/health/ready
                  port: 8080
                  scheme: HTTP
                timeoutSeconds: 10
                periodSeconds: 10
                successThreshold: 1
                failureThreshold: 10
              livenessProbe:
                httpGet:
                  path: /q/health/live
                  port: 8080
                  scheme: HTTP
                timeoutSeconds: 15
                periodSeconds: 60
                successThreshold: 1
                failureThreshold: 2
          restartPolicy: Always
          terminationGracePeriodSeconds: 30
          dnsPolicy: ClusterFirst
          schedulerName: default-scheduler
  
  - apiVersion: v1
    kind: Service
    metadata:
      name: inf-batch-job
      namespace: ${NAMESPACE}
      labels:
        app: inf-batch-job
    spec:
      selector:
        app: inf-batch-job
        deployment: inf-batch-job
      ports:
        - name: http
          port: 8080
          targetPort: 8080
          protocol: TCP
      type: ClusterIP

parameters:
  - name: NAMESPACE
    displayName: Namespace
    description: OpenShift namespace där applikationen ska deployas
    required: true
  
  - name: IMAGE_REGISTRY
    displayName: Image Registry
    description: Container registry URL
    value: image-registry.openshift-image-registry.svc:5000
    required: true
  
  - name: IMAGE_TAG
    displayName: Image Tag
    description: Tag för container image
    value: latest
    required: true
  
  - name: SERVICE_ACCOUNT_NAME
    displayName: Service Account
    description: ServiceAccount som applikationen ska köra som
    value: duplosa
    required: true
  
  - name: CPU_LIMIT
    displayName: CPU Limit
    description: Max CPU för container
    value: "1"
  
  - name: MEMORY_LIMIT
    displayName: Memory Limit
    description: Max memory för container
    value: "512Mi"
  
  - name: CPU_REQUEST
    displayName: CPU Request
    description: CPU request för container
    value: "100m"
  
  - name: MEMORY_REQUEST
    displayName: Memory Request
    description: Memory request för container
    value: "256Mi"
