quarkus.application.name=inf-javabatch
quarkus.banner.enabled=false
quarkus.log.level=INFO

job.hook.start-url=${START:}
job.hook.status-url=${STATUS:}
job.hook.stop-url=${STOP:}
job.hook.exec-id-param-name=${EXEC_ID_PARAM_NAME:execId}
job.hook.http-timeout-seconds=${HTTP_TIMEOUT_SECONDS:30}
job.hook.status-poll-interval-seconds=${STATUS_POLL_INTERVAL_SECONDS:5}
job.hook.max-poll-seconds=${MAX_POLL_SECONDS:3600}
job.hook.stop-wait-seconds=${STOP_WAIT_SECONDS:15}
job.hook.max-status-error-retries=${MAX_STATUS_ERROR_RETRIES:12}
job.hook.max-unknown-status-retries=${MAX_UNKNOWN_STATUS_RETRIES:12}
job.hook.fail-open-on-status-error=${FAIL_OPEN_ON_STATUS_ERROR:true}
job.hook.active-status-values=${ACTIVE_STATUS_VALUES:STARTING,STARTED,STOPPING}
job.hook.success-status-values=${SUCCESS_STATUS_VALUES:COMPLETED}
job.hook.failure-status-values=${FAILURE_STATUS_VALUES:FAILED,ABANDONED,UNKNOWN,STOPPED}