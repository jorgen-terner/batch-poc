apiVersion: v1
kind: ConfigMap
metadata:
  name: inf-batch-javabatch-config
  namespace: dev252
  labels:
    app: inf-batch-javabatch
    version: "1.0"
data:
  # Job configuration consumed by inf-batch-job
  image: "image-registry.openshift-image-registry.svc:5000/dev252/inf-javabatch-app:latest"
  imagePullPolicy: "Always"
  jobName: "inf-javabatch-app"
  parallelism: "1"
  completions: "1"
  ttlSecondsAfterFinished: "3600"
  backoffLimit: "0"

  # inf-batch-job sets container.command, so the full launch command lives here.
  # The command reads runtime values from env vars injected from this same ConfigMap.
  command: "/bin/sh,-c,exec java ${JAVA_OPTS:-} -jar /deployments/inf-javabatch-app.jar --${JOB_ACTION:-start} -a \"${JOB_ARGS:-}\" -t \"${FKST:-}\""

  # Runtime metadata consumed by inf-javabatch-app
  TO_JOB_NAME: "inf-batch-javabatch"
  TO_ENV_NAME: "MANUELL"
  JAVA_OPTS: "-Djava.util.logging.manager=org.jboss.logmanager.LogManager -Duser.language=sv -Duser.country=SE"

  # Endpoint configuration read by inf-javabatch-app
  JAVABATCH_START: "http://springbatch-api.example.svc.cluster.local/v2/start"
  JAVABATCH_STATUS: "http://springbatch-api.example.svc.cluster.local/v2/status"
  JAVABATCH_STOP: "http://springbatch-api.example.svc.cluster.local/v2/stop"
  JAVABATCH_RESTART: "http://springbatch-api.example.svc.cluster.local/v2/restart"
  JAVABATCH_SUMMARY: "http://springbatch-api.example.svc.cluster.local/v2/summary"
  JAVABATCH_HELP: "http://springbatch-api.example.svc.cluster.local/v2/help"

  # Runtime defaults (can be overridden from API request.env)
  JOB_ACTION: "start"
  JOB_ARGS: ""
  FKST: ""
