{{- if .Values.triggerApi.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "k8s-jobs-example.fullname" . }}-trigger-api
  labels:
    {{- include "k8s-jobs-example.commonLabels" . | nindent 4 }}
data:
  server.js: |
    const fs = require('node:fs');
    const https = require('node:https');
    const http = require('node:http');

    const token = fs.readFileSync('/var/run/secrets/kubernetes.io/serviceaccount/token', 'utf8').trim();
    const namespace = fs.readFileSync('/var/run/secrets/kubernetes.io/serviceaccount/namespace', 'utf8').trim();
    const ca = fs.readFileSync('/var/run/secrets/kubernetes.io/serviceaccount/ca.crt');
    const apiHost = process.env.KUBERNETES_SERVICE_HOST;
    const apiPort = process.env.KUBERNETES_SERVICE_PORT || '443';
    const listenPort = Number(process.env.PORT || '8080');

    function json(res, statusCode, payload) {
      res.writeHead(statusCode, { 'Content-Type': 'application/json' });
      res.end(JSON.stringify(payload));
    }

    function randomSuffix() {
      return Math.random().toString(36).slice(2, 8);
    }

    function computePhase(status) {
      if (!status) return 'Pending';
      if ((status.succeeded || 0) > 0) return 'Complete';
      if ((status.failed || 0) > 0 && (status.active || 0) === 0) return 'Failed';
      if ((status.active || 0) > 0) return 'Running';
      return 'Pending';
    }

    function k8sRequest(path, method, body) {
      return new Promise((resolve, reject) => {
        const req = https.request({
          host: apiHost,
          port: apiPort,
          path,
          method,
          ca,
          headers: {
            Authorization: `Bearer ${token}`,
            Accept: 'application/json',
            ...(body ? { 'Content-Type': 'application/json' } : {})
          }
        }, (res) => {
          let data = '';
          res.on('data', (chunk) => {
            data += chunk;
          });
          res.on('end', () => {
            const parsed = data ? JSON.parse(data) : {};
            if (res.statusCode >= 200 && res.statusCode < 300) {
              resolve(parsed);
              return;
            }
            reject({
              statusCode: res.statusCode,
              body: parsed
            });
          });
        });

        req.on('error', (error) => reject({ statusCode: 500, body: { message: error.message } }));
        if (body) {
          req.write(JSON.stringify(body));
        }
        req.end();
      });
    }

    async function readJsonBody(req) {
      return new Promise((resolve) => {
        let data = '';
        req.on('data', (chunk) => {
          data += chunk;
        });
        req.on('end', () => {
          if (!data) {
            resolve({});
            return;
          }
          try {
            resolve(JSON.parse(data));
          } catch {
            resolve({});
          }
        });
      });
    }

    const server = http.createServer(async (req, res) => {
      try {
        const url = new URL(req.url, `http://${req.headers.host}`);

        if (req.method === 'GET' && url.pathname === '/health') {
          json(res, 200, { ok: true });
          return;
        }

        if (req.method === 'POST' && url.pathname.startsWith('/trigger/')) {
          const templateJobName = decodeURIComponent(url.pathname.replace('/trigger/', ''));
          if (!templateJobName) {
            json(res, 400, { error: 'Missing templateJobName in path' });
            return;
          }

          const body = await readJsonBody(req);
          const templateJobPath = `/apis/batch/v1/namespaces/${namespace}/jobs/${encodeURIComponent(templateJobName)}`;
          const templateJob = await k8sRequest(templateJobPath, 'GET');

          const generatedName = body.jobName || `${templateJobName}-manual-${Date.now()}-${randomSuffix()}`;
          const job = {
            apiVersion: 'batch/v1',
            kind: 'Job',
            metadata: {
              name: generatedName,
              labels: {
                ...(templateJob.metadata?.labels || {}),
                'batch.example/triggered-by': 'http-api',
                'batch.example/template': templateJobName
              }
            },
            spec: {
              ...(templateJob.spec || {}),
              suspend: false
            }
          };

          const created = await k8sRequest(`/apis/batch/v1/namespaces/${namespace}/jobs`, 'POST', job);
          json(res, 201, {
            message: 'Job created',
            namespace,
            template: templateJobName,
            jobName: created.metadata?.name
          });
          return;
        }

        if (req.method === 'GET' && url.pathname.startsWith('/jobs/')) {
          const jobName = decodeURIComponent(url.pathname.replace('/jobs/', ''));
          if (!jobName) {
            json(res, 400, { error: 'Missing jobName in path' });
            return;
          }

          const job = await k8sRequest(`/apis/batch/v1/namespaces/${namespace}/jobs/${encodeURIComponent(jobName)}`, 'GET');
          const status = job.status || {};
          json(res, 200, {
            namespace,
            jobName,
            phase: computePhase(status),
            active: status.active || 0,
            succeeded: status.succeeded || 0,
            failed: status.failed || 0,
            conditions: status.conditions || []
          });
          return;
        }

        json(res, 404, { error: 'Not Found' });
      } catch (err) {
        json(res, err.statusCode || 500, {
          error: 'Kubernetes API request failed',
          details: err.body || { message: 'Unknown error' }
        });
      }
    });

    server.listen(listenPort, () => {
      console.log(`Trigger API listening on :${listenPort}`);
    });
{{- end }}
