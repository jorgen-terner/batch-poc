{{- if .Values.triggerApi.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "k8s-jobs-example.fullname" . }}-trigger-api
  labels:
    {{- include "k8s-jobs-example.commonLabels" . | nindent 4 }}
    app.kubernetes.io/component: trigger-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "k8s-jobs-example.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: trigger-api
  template:
    metadata:
      labels:
        {{- include "k8s-jobs-example.commonLabels" . | nindent 8 }}
        app.kubernetes.io/component: trigger-api
    spec:
      serviceAccountName: {{ include "k8s-jobs-example.serviceAccountName" . }}
      containers:
        - name: trigger-api
          image: {{ .Values.triggerApi.image | quote }}
          imagePullPolicy: IfNotPresent
          command:
            - node
            - /app/server.js
          env:
            - name: PORT
              value: {{ .Values.triggerApi.port | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.triggerApi.port }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: app
              mountPath: /app
      volumes:
        - name: app
          configMap:
            name: {{ include "k8s-jobs-example.fullname" . }}-trigger-api
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "k8s-jobs-example.fullname" . }}-trigger-api
  labels:
    {{- include "k8s-jobs-example.commonLabels" . | nindent 4 }}
    app.kubernetes.io/component: trigger-api
spec:
  type: {{ .Values.triggerApi.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "k8s-jobs-example.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: trigger-api
  ports:
    - name: http
      port: {{ .Values.triggerApi.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}
