nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""

rbac:
  create: true

labels:
  owner: batch-team

jobs:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600

scriptJob:
  enabled: true
  cronTemplateName: script-template
  schedule: "0 0 31 2 *"
  image: bash:5.2
  command:
    - /bin/sh
    - -c
    - |
      echo "Start script-jobb";
      date;
      echo "Klart";
  env:
    - name: JOB_KIND
      value: script

springBatchJob:
  enabled: true
  cronTemplateName: spring-template
  schedule: "0 0 31 2 *"
  image: ghcr.io/example/spring-batch-app:latest
  command:
    - java
    - -jar
    - app.jar
    - --spring.batch.job.name=exampleJob
  env:
    - name: SPRING_PROFILES_ACTIVE
      value: k8s
    - name: JOB_KIND
      value: spring-batch

triggerApi:
  enabled: true
  image: node:20-alpine
  port: 8080
  service:
    type: ClusterIP
    port: 8080
