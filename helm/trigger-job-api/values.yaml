replicaCount: 1

image:
  registry: docker.io
  repository: trigger-job-api
  pullPolicy: IfNotPresent
  tag: "latest"

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

ingress:
  enabled: false
  className: "nginx"
  annotations: {}
  hosts:
    - host: api.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

# Kubernetes API server config
kubernetesApi:
  namespace: default
  jobTTLSecondsAfterFinished: 86400  # 24 hours

# Application config
app:
  logLevel: INFO

# Service Account
serviceAccount:
  create: true
  name: ""
