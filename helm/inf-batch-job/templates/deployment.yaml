{{ $checksum := (printf "%s" (($.Files.Glob "config/*").AsConfig) | sha256sum) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "inf-batch-job.fullname" . }}
  labels:
    {{- include "inf-batch-job.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "inf-batch-job.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ $checksum }}    
      labels:
        {{- include "inf-batch-job.selectorLabels" . | nindent 8 }}
    spec:
      volumes:
        - name: logs-pvc
          persistentVolumeClaim:
            claimName: {{ include "inf-batch-job.name.pvc" . }}
        - name: nginx-conf
          configMap:
            name: {{ include "inf-batch-job.fullname" . }}-config
      containers:
      - name: {{ .Chart.Name }}
        image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command: ["java"]
        args: ["-jar", "/deployments/quarkus-run.jar"]
        volumeMounts:
        - name: logs-pvc
          mountPath: /logs
        - name: nginx-conf
          mountPath: /etc/nginx/conf.d
        ports:
        - name: http
          containerPort: {{ .Values.service.targetPort }}
          protocol: TCP
        env:
        - name: K8S_NAMESPACE
          value: {{ .Values.kubernetesApi.namespace | quote }}
        - name: LOG_LEVEL
          value: {{ .Values.app.logLevel | quote }}
        - name: JOB_TTL_SECONDS
          value: {{ .Values.kubernetesApi.jobTTLSecondsAfterFinished | quote }}
        livenessProbe:
          httpGet:
            path: /actuator/health/live
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health/ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        resources:
          {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
