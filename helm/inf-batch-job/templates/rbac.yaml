apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "inf-batch-job.serviceAccountName" . }}
  labels:
    {{- include "inf-batch-job.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "inf-batch-job.fullname" . }}
  labels:
    {{- include "inf-batch-job.labels" . | nindent 4 }}
rules:
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["create", "get", "list", "watch", "delete", "patch", "update"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "inf-batch-job.fullname" . }}
  labels:
    {{- include "inf-batch-job.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "inf-batch-job.fullname" . }}
subjects:
- kind: ServiceAccount
  name: {{ include "inf-batch-job.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
