apiVersion: batch/v1
kind: Job
metadata:
  name: __JOB_NAME__
spec:
  suspend: true
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: __JOB_NAME__
    spec:
      restartPolicy: Never
      containers:
        - name: javabatch-worker
          image: python:3.12-slim
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              exec /bin/bash /opt/jbatch/javabatch_worker.sh
          env:
            - name: JOB_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: JOB_NAME
              value: __JOB_NAME__
            - name: JOB_CONFIG
              value: /opt/jbatch/springbatch_job.ini
            - name: JOB_ARGS
              value: defaultJob
            - name: FKST_TOKEN
              value: ""
            - name: BATCH_APP_BASE_URL
              value: __BATCH_APP_BASE_URL__
            - name: REPORT_INTERVAL_SECONDS
              value: "10"
            - name: ENABLE_PROGRESS_REPORT
              value: "false"
            - name: LEGACY_MONITOR_ENABLED
              value: "false"
            - name: MONITOR_SCRIPT_PATH
              value: /opt/jbatch/monitor_jbatch.sh
          volumeMounts:
            - name: jbatch-scripts
              mountPath: /opt/jbatch
      volumes:
        - name: jbatch-scripts
          configMap:
            name: javabatch-job-scripts
            defaultMode: 0755
