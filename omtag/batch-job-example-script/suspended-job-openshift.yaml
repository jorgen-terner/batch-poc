apiVersion: batch/v1
kind: Job
metadata:
  name: __JOB_NAME__
spec:
  suspend: true
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: sample-batch-job
    spec:
      restartPolicy: Never
      containers:
        - name: batch-worker
          image: registry.access.redhat.com/ubi9/ubi-minimal:latest
          command:
            - /bin/bash
            - /opt/scripts/worker.sh
          env:
            - name: JOB_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: JOB_NAME
              value: sample-batch-job
            - name: BATCH_APP_BASE_URL
              value: http://batch-job-app.default.svc.cluster.local:8080
            - name: TOTAL_STEPS
              value: "10"
            - name: SLEEP_SECONDS
              value: "3"
          volumeMounts:
            - name: batch-script
              mountPath: /opt/scripts
      volumes:
        - name: batch-script
          configMap:
            name: sample-batch-script
            defaultMode: 0755
