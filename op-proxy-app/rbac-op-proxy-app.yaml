---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: inf-batch-job-role
  namespace: dev252
  labels:
    app: inf-batch-job
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: inf-batch-job-rolebinding
  namespace: dev252
  labels:
    app: inf-batch-job
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: inf-batch-job-role
subjects:
  - kind: ServiceAccount
    name: duplosa