apiVersion: v1
kind: ConfigMap
metadata:
  name: inf-batch-testapp1-config
  namespace: dev252
  labels:
    app: inf-batch-testapp1
    version: "1.0"
data:
  # ============================================================
  # Job Configuration (läses av inf-batch-job)
  # ============================================================
  image: "image-registry.openshift-image-registry.svc:5000/dev252/inf-batch-testapp1:latest"
  imagePullPolicy: "Always"
  jobName: "testapp1"
  
  # Job execution settings
  parallelism: "1"
  completions: "1"
  ttlSecondsAfterFinished: "3600"
  backoffLimit: "3"
  
  # ============================================================
  # Application Configuration (miljövariabler för batch-appen)
  # ============================================================
  
  # Batch processing settings
  BATCH_SIZE: "100"
  PROCESSING_TIMEOUT: "300"
  MAX_RETRIES: "3"
  
  # Logging
  LOG_LEVEL: "INFO"
  
  # Simulation settings (för testappen)
  SIMULATION_STEPS: "5"
  SIMULATION_DELAY_SECONDS: "2"
  
  # Optional: Database/Integration settings
  # DATABASE_URL: "jdbc:postgresql://db:5432/mydb"
  # API_ENDPOINT: "http://api-service:8080/api"
